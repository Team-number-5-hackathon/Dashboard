definitions:
  Competence:
    required:
      - name
    type: object
    properties:
      id:
        title: ID
        type: integer
        readOnly: true
      name:
        title: Название компетенции
        type: string
        maxLength: 150
        minLength: 1
  EmployeeGrades:
    type: object
    properties:
      grade:
        title: Grade
        type: string
        readOnly: true
        minLength: 1
      grade_employee_count:
        title: Grade employee count
        type: integer
        readOnly: true
      total_employee_count:
        title: Total employee count
        type: integer
        readOnly: true
      percentage:
        title: Percentage
        type: string
        readOnly: true
  EmployeePositionRating:
    required:
      - position
      - average_rating
    type: object
    properties:
      position:
        title: Position
        type: string
        minLength: 1
      average_rating:
        title: Average rating
        type: string
        format: decimal
  EmployeePositions:
    type: object
    properties:
      position:
        title: Position
        type: string
        readOnly: true
        minLength: 1
      position_employee_count:
        title: Position employee count
        type: integer
        readOnly: true
      total_employee_count:
        title: Total employee count
        type: integer
        readOnly: true
      percentage:
        title: Percentage
        type: string
        readOnly: true
  EmployeesCountWithSkills:
    type: object
    properties:
      domain:
        title: Domain
        type: string
        readOnly: true
        minLength: 1
      skill_id:
        title: Skill id
        type: string
        readOnly: true
        minLength: 1
      skill_name:
        title: Skill name
        type: string
        readOnly: true
        minLength: 1
      count_employees:
        title: Count employees
        type: integer
        readOnly: true
  EmployeesWithSkill:
    type: object
    properties:
      domain:
        title: Domain
        type: string
        readOnly: true
        minLength: 1
      employee:
        title: Employee
        type: string
        readOnly: true
        minLength: 1
      count_employees:
        title: Count employees
        type: integer
        readOnly: true
  SkillsDevelopment:
    required:
      - rating_date
      - average_rating
      - average_rating_hard
      - average_rating_soft
    type: object
    properties:
      rating_date:
        title: Rating date
        type: string
        format: date
      average_rating:
        title: Average rating
        type: string
        format: decimal
      average_rating_hard:
        title: Average rating hard
        type: string
        format: decimal
      average_rating_soft:
        title: Average rating soft
        type: string
        format: decimal
  SuitabilityPosition:
    required:
      - total_yes
      - total
      - percentage
    type: object
    properties:
      employee_id:
        title: Employee id
        type: string
        readOnly: true
        minLength: 1
      employee:
        title: Employee
        type: string
        readOnly: true
        minLength: 1
      total_yes:
        title: Total yes
        type: integer
      total:
        title: Total
        type: integer
      percentage:
        title: Percentage
        type: number
  EmployeeSkillAverageRating:
    type: object
    properties:
      skill_name:
        title: Skill name
        type: string
        readOnly: true
        minLength: 1
      average_rating:
        title: Average rating
        type: number
        readOnly: true
  Domain:
    required:
      - name
    type: object
    properties:
      id:
        title: ID
        type: integer
        readOnly: true
      name:
        title: Название домена
        type: string
        maxLength: 50
        minLength: 1
  Employee:
    required:
      - first_name
      - last_name
    type: object
    properties:
      id:
        title: ID
        type: integer
        readOnly: true
      team:
        title: Team
        type: string
        readOnly: true
      position:
        title: Position
        type: string
        readOnly: true
      first_name:
        title: Имя сотрудника
        type: string
        maxLength: 50
        minLength: 1
      last_name:
        title: Фамилия сотрудника
        type: string
        maxLength: 50
        minLength: 1
      grade:
        title: Грейд сотрудника
        type: string
        enum:
          - Junior
          - Middle
          - Senior
          - Intern
          - Lead
          - Head
  Position:
    required:
      - name
    type: object
    properties:
      id:
        title: ID
        type: integer
        readOnly: true
      name:
        title: Название должности
        type: string
        maxLength: 150
        minLength: 1
  Rating:
    required:
      - rating_date
      - rating_value
    type: object
    properties:
      employee:
        title: Employee
        type: string
        readOnly: true
      team:
        title: Team
        type: string
        readOnly: true
      grade:
        title: Grade
        type: string
        readOnly: true
      position:
        title: Position
        type: string
        readOnly: true
      skill:
        title: Skill
        type: string
        readOnly: true
      rating_date:
        title: Дата оценки
        type: string
        format: date
      rating_value:
        title: Оценка сотрудника
        type: integer
        enum:
          - 1
          - 2
          - 3
          - 4
          - 5
      suitability:
        title: Соответствие
        type: string
        enum:
          - да
          - нет
          - не требуется
  Skill:
    required:
      - name
    type: object
    properties:
      id:
        title: ID
        type: integer
        readOnly: true
      name:
        title: Название навыка
        type: string
        maxLength: 150
        minLength: 1
  Team:
